<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Playback Speed</h1>
  </div>
  <div class="controls">
    <button id="btn-slower" class="icon-btn">-</button>
    <div class="slider-container">
      <input type="range" id="speed-slider" min="0.1" max="4.0" step="0.1" value="1.0">
      <div id="speed-display">1.0x</div>
    </div>
    <button id="btn-faster" class="icon-btn">+</button>
  </div>
  <div class="shortcuts">
    <span>Shortcuts:</span>
    <kbd>S</kbd> Slower &nbsp;&nbsp; <kbd>D</kbd> Faster
  </div>
  <script src="popup.js"></script>
</body>
</html>
